<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body{font-family:Inter,sans-serif}.gradient-hero{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}.fade-in{animation:fadeIn 1s ease-in}@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}</style>
</head>
<body class="bg-gray-50 text-gray-800">
    <section class="gradient-hero text-white min-h-screen flex items-center justify-center px-4">
        <div class="text-center max-w-4xl fade-in">
            <h1 class="text-5xl md:text-7xl font-bold mb-6 leading-tight">{{HEADLINE}}</h1>
            <p class="text-xl md:text-2xl mb-8 opacity-90">{{SUBHEADLINE}}</p>
            <button class="bg-white text-purple-600 px-8 py-4 rounded-full font-semibold text-lg hover:scale-105 transition-transform shadow-lg">{{CTA}}</button>
        </div>
    </section>
    <section class="py-20 px-4 max-w-6xl mx-auto">
        <h2 class="text-4xl font-bold text-center mb-16">{{SERVICES_TITLE}}</h2>
        <div class="grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-xl transition-shadow">
                <h3 class="text-xl font-semibold mb-2">{{S1_TITLE}}</h3>
                <p class="text-gray-600">{{S1_DESC}}</p>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-xl transition-shadow">
                <h3 class="text-xl font-semibold mb-2">{{S2_TITLE}}</h3>
                <p class="text-gray-600">{{S2_DESC}}</p>
            </div>
            <div class="bg-white p-8 rounded-2xl shadow-lg hover:shadow-xl transition-shadow">
                <h3 class="text-xl font-semibold mb-2">{{S3_TITLE}}</h3>
                <p class="text-gray-600">{{S3_DESC}}</p>
            </div>
        </div>
    </section>
    <section class="bg-gray-900 text-white py-20 px-4">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-4xl font-bold mb-8">{{CONTACT_TITLE}}</h2>
            <p class="text-xl mb-8 opacity-80">{{CONTACT_DESC}}</p>
            <a href="tel:{{PHONE}}" class="bg-purple-600 px-8 py-4 rounded-full font-semibold hover:bg-purple-700 transition-colors inline-block">{{PHONE}}</a>
        </div>
    </section>
    <footer class="bg-gray-950 text-gray-400 py-8 text-center"><p>{{FOOTER}}</p></footer>
</body>
</html>
